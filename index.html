<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>Panel</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:#0f172a;
    color:#fff;
}

/* هدر */
.header {
    background:#020617;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

/* کارت */
.card {
    background:#111827;
    margin:15px;
    padding:15px;
    border-radius:12px;
}

/* دکمه */
.btn {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:#fff;
    font-weight:bold;
}

/* اینپوت */
input,select {
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:none;
    background:#020617;
    color:#fff;
}

/* سفارش */
.order {
    background:#020617;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}
</style>

</head>

<body>

<div id="app"></div>

<script src="app.js"></script>
</body>
</html>
